<div class="app-shell">
  <aside class="sidebar-desktop">
    <div class="brand">
      <div class="brand-icon">JP</div>
      <div class="brand-info">
        <span class="brand-name">Finance<strong>PRO</strong></span>
        <span class="brand-status">Online</span>
      </div>
    </div>

    <nav class="nav-group">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">
        <span class="icon">🏠</span> 
        <span class="label">Dashboard</span>
      </a>
      <a routerLink="/orcamentos" routerLinkActive="active" class="nav-link">
        <span class="icon">🎯</span> 
        <span class="label">Metas</span>
      </a>
      <a routerLink="/estatisticas" routerLinkActive="active" class="nav-link">
        <span class="icon">📊</span> 
        <span class="label">Estatísticas</span>
      </a>
      <a routerLink="/configuracoes" routerLinkActive="active" class="nav-link">
        <span class="icon">⚙️</span> 
        <span class="label">Ajustes</span>
      </a>
      <button (click)="togglePrivacidade()" class="btn-privacy">
        <span style="font-size: 0.9rem; margin-right: 10px; font-weight: 600; color: #64748b;">
          {{ privacyService.isFurtivo() ? 'Mostrar valores' : 'Ocultar valores' }}
        </span>
        {{ privacyService.isFurtivo() ? '👁️' : '🙈' }}
      </button>
    </nav>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <nav class="mobile-nav">
    <div class="mobile-nav-inner">
      <a routerLink="/dashboard" routerLinkActive="active-m">🏠</a>
      <a routerLink="/orcamentos" routerLinkActive="active-m">🎯</a>
      <a routerLink="/estatisticas" routerLinkActive="active-m">📊</a>
      <a routerLink="/configuracoes" routerLinkActive="active-m">⚙️</a>
      <button (click)="togglePrivacidade()" class="btn-privacy">
        <span style="font-size: 0.9rem; margin-right: 10px; font-weight: 600; color: #64748b;">
          {{ privacyService.isFurtivo() ? 'Mostrar valores' : 'Ocultar valores' }}
        </span>
        {{ privacyService.isFurtivo() ? '👁️' : '🙈' }}
      </button>
    </div>
  </nav>
</div>
