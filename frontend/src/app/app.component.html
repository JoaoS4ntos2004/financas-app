<div class="app-shell">
  <header class="mobile-top-header">
    <div class="brand-m">
      <div class="brand-icon-m">JP</div>
      <span class="brand-name">Finance<strong>PRO</strong></span>
    </div>
    <button (click)="togglePrivacidade()" class="btn-privacy">
      <span style="font-size: 0.9rem; margin-right: 10px; font-weight: 600; color: #64748b;">
        {{ privacyService.isFurtivo() ? 'Exibir valores' : 'Ocultar valores' }}
      </span>
      @if(privacyService.isFurtivo()) {
        <svg width="18" height="18" fill="none" stroke="#64748b" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22"></path></svg>
      } @else {
        <svg width="18" height="18" fill="none" stroke="#64748b" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      }
    </button>
  </header>

  <aside class="sidebar-desktop">
    <div class="brand">
      <div class="brand-icon">JP</div>
      <div class="brand-info">
        <span class="brand-name">Finance<strong>PRO</strong></span>
        <span class="brand-status">Online</span>
      </div>
    </div>

    <nav class="nav-group">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">
        <span class="icon">🏠</span> 
        <span class="label">Dashboard</span>
      </a>
      <a routerLink="/orcamentos" routerLinkActive="active" class="nav-link">
        <span class="icon">🎯</span> 
        <span class="label">Metas</span>
      </a>
      <a routerLink="/estatisticas" routerLinkActive="active" class="nav-link">
        <span class="icon">📊</span> 
        <span class="label">Estatísticas</span>
      </a>
      <a routerLink="/configuracoes" routerLinkActive="active" class="nav-link">
        <span class="icon">⚙️</span> 
        <span class="label">Ajustes</span>
      </a>
      <button (click)="togglePrivacidade()" class="btn-privacy-top" style="display: flex; align-items: center; justify-content: center; color: #1e293b;">
        @if(privacyService.isFurtivo()) {
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22"></path></svg>
        } @else {
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        }
      </button>
    </nav>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <nav class="mobile-nav">
    <div class="mobile-nav-inner">
      <a routerLink="/dashboard" routerLinkActive="active-m">🏠</a>
      <a routerLink="/orcamentos" routerLinkActive="active-m">🎯</a>
      <a routerLink="/estatisticas" routerLinkActive="active-m">📊</a>
      <a routerLink="/configuracoes" routerLinkActive="active-m">⚙️</a>
    </div>
  </nav>
</div>
